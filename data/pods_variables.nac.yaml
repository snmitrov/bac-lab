
meraki:
  domains:
    - name: US
      administrator:
        name: admin
      organizations:
        - name: !env org_name
          networks:
            - name: Uni-Branch-1
              managed: false
              templates: [nw_setup, nw_management, app_ports, switch, small_branch_inventory, wan_dhcp_dhcp, wireless, app_settings, app_spoke,  app_vlans, app_fw, app_ts,app_content, app_intrusion, app_mal, app_static_routes, group_policies]
              variables:
                syslog_server: 3.4.5.6
                syslog_port: 514
                netflow_server: 4.5.6.7
                netflow_port: 2055
                appliance_01_name: Unified Branch Network 1 Appliance 
                access_switch_01_name: Unified Branch Network 1 Switch
                ap_01_name: Unified Branch Network 1 Access Point
                appliance_01_serial: !env branch1_mx_serial
                access_switch_01_serial: !env branch1_ms_serial
                ap_01_serial: !env branch1_cw_serial
                lat: 37.41809510000001
                lng: -122.098531
                wan1_enabled: true
                wan2_enabled: true
                address: Wake Forest, N.C.
                vlan10_subnet: 10.1.10.0/24
                vlan10_appliance_ip: 10.1.10.1
                vlan20_subnet: 10.1.20.0/24
                vlan20_appliance_ip: 10.1.20.1
                # vlan30_subnet: 10.1.30.0/24
                # vlan30_appliance_ip: 10.1.30.1
                # vlan50_subnet: 10.1.50.0/24
                # vlan50_appliance_ip: 10.1.50.1
                vlan999_subnet: 10.1.255.0/24
                vlan999_appliance_ip: 10.1.255.1
                hub_network_name: !env vpn_hub_network_name
                data_wireless_ssid_name: Data
                data_vlan_group_policy: Employees
                voice_vlan_group_policy: Voice
                iot_vlan_group_policy: Iot
                data_ssid_schedules_enabled: true
                guest_wireless_ssid_name: Guest
                guest_wireless_client_bw_down: 0
                guest_wireless_client_bw_up: 0
                guest_wireless_ssid_bw_down: 0
                guest_wireless_ssid_bw_up: 0
                guest_ssid_schedules_enabled: true
                guest_ssid_welcome_message: Unauthorized access is prohibited.
                radius_accounting_server1_host: 172.16.1.1
                radius_accounting_server1_port: 1813
                radius_accounting_server2_host: 172.16.1.2
                radius_server1_host: 172.16.1.1
                radius_server1_port: 1812
                radius_server2_host: 172.16.1.2
                static_route1_subnet: 10.101.10.0/24
                static_route1_gw: 10.1.10.2
                static_route2_subnet: 10.101.20.0/24
                static_route2_gw: 10.1.20.2
                # static_route1_enabled: true
                # static_route2_enabled: true
                splash_reply_to_email_address: example@example.com
                switch_mtu_size: 9176
                time_zone: America/Los_Angeles
                network_notes: This is a small branch network created via Netascode.
                wan_limit_down: 0
                wan_limit_up: 0
                wan1_limit_down: 400000
                wan1_limit_up: 400000
                wan2_limit_down: 500000
                wan2_limit_up: 500000
            - name: Uni-Branch-2
              templates: [nw_setup, nw_management, app_ports, switch, small_branch_inventory, wan_dhcp_dhcp, wireless, app_settings, app_spoke,  app_vlans, app_fw, app_ts,app_content, app_intrusion, app_mal, app_static_routes, group_policies]
              variables:
                syslog_server: 3.4.5.6
                syslog_port: 514
                # netflow_server: 4.5.6.7
                # netflow_port: 2055
                appliance_01_name: Unified Branch Network 2 Appliance
                access_switch_01_name: Unified Branch Network 2 Switch
                ap_01_name: Unified Branch Network 2 Access Point
                appliance_01_serial: !env branch2_mx_serial
                access_switch_01_serial: !env branch2_ms_serial
                ap_01_serial: !env branch2_cw_serial
                lat: 37.41809510000001
