###############################################################################
# GitHub Actions Workflow – bac-lab – Destroy
# Manually triggered workflow to destroy all Terraform-managed resources
###############################################################################

name: Destroy Created Branches

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm resource destruction'
        required: true
        type: string

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

env:
  # ── Force Node.js 24 for all JavaScript-based actions ─────────────────
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # ── Organisation / domain ──────────────────────────────────────────────
  domain:          "USA-DEMO"
  org:             "netascode"
  org_admin:       "admin"
  org_admin_email: "admin-branch@netascode.cisco.com"
  # ── SNMP / local-page / RADIUS credentials ────────────────────────────
  v3_auth_pass:                       "Cisco12345"
  v3_priv_pass:                       "Cisco12345"
  local_status_page_username:         "admin"
  local_page_username:                "admin"
  local_status_page_password:         "Cisco!12345C60972A"
  local_page_password:                "Cisco!12345C60972A"
  radius_accounting_server1_secret:   "Cisco12345!"
  radius_server1_secret:              "Cisco12345!"
  snmp_username:                      "admin"
  snmp_passphrase:                    "Cisco12345"
  # ── Terraform ──────────────────────────────────────────────────────────
  TF_VAR_meraki_api_key: ${{ secrets.MERAKI_API_KEY }}
  TF_IN_AUTOMATION: "true"
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
  # ── !env-referenced vars ──────────────────────────────────────────────
  org_name:              ${{ secrets.ORG_NAME }}
  vpn_hub_network_name:  ${{ secrets.VPN_HUB_NETWORK_NAME }}
  branch1_mx_serial:     ${{ secrets.BRANCH1_MX_SERIAL }}
  branch1_ms_serial:     ${{ secrets.BRANCH1_MS_SERIAL }}
  branch1_cw_serial:     ${{ secrets.BRANCH1_CW_SERIAL }}
  branch2_mx_serial:     ${{ secrets.BRANCH2_MX_SERIAL }}
  branch2_ms_serial:     ${{ secrets.BRANCH2_MS_SERIAL }}
  branch2_cw_serial:     ${{ secrets.BRANCH2_CW_SERIAL }}
  # ── Webex notification ─────────────────────────────────────────────────
  WEBEX_ROOM_ID: "Y2lzY29zcGFyazovL3VzL1JPT00vNTFmMGNmODAtYjI0My0xMWU5LTljZjUtNWY0NGQ2ZTlmYWY0"

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    environment: production     # Requires the same reviewer approval as deploy
    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Confirmation input must be exactly 'destroy'. Aborting."
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding with destroy..."

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -auto-approve -input=false

      - name: Send Webex destroy notification
        if: always()
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="🗑️"
            MSG="Resources destroyed successfully"
          else
            ICON="⚠️"
            MSG="Destroy attempt finished with status: ${STATUS}"
          fi

          curl -s -X POST "https://webexapis.com/v1/messages" \
            -H "Authorization: Bearer ${WEBEX_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"roomId\": \"${WEBEX_ROOM_ID}\",
              \"markdown\": \"${ICON} **Terraform Destroy – ${STATUS}**\n\n${MSG}\n\n- Repository: ${{ github.repository }}\n- Branch: ${{ github.ref_name }}\n- Triggered by: ${{ github.actor }}\n- [Workflow Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
            }"
